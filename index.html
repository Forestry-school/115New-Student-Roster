<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115學年度 新生班級查詢系統</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background-color: white; 
            padding: 40px 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 450px; 
            text-align: center; 
            max-height: 90vh; 
            overflow-y: auto; 
        }
        
        /* 校徽的樣式 */
        .school-logo {
            width: 300px; /* 如果覺得太大或太小，可以改這個數字 */
            height: auto;
            margin-bottom: 15px;
        }

        /* 標題字體放大 */
        h1 { color: #333; font-size: 30px; margin-bottom: 15px; font-weight: bold; letter-spacing: 1px; margin-top: 0; }
        .subtitle { color:#666; font-size: 18px; margin-bottom: 25px; }
        
        /* 輸入框字體與點擊範圍放大 */
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 20px; 
            border: 2px solid #ccc; 
            border-radius: 8px; 
            font-size: 22px; 
            box-sizing: border-box; 
            text-align: center; 
        }
        /* 查詢按鈕字體與點擊範圍放大 */
        button { 
            background-color: #00b900; 
            color: white; 
            border: none; 
            padding: 16px 20px; 
            border-radius: 8px; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            letter-spacing: 2px;
        }
        button:hover { background-color: #009900; }
        
        #result { 
            margin-top: 25px; 
            text-align: left; 
            display: none; 
            background: #f9f9f9; 
            padding: 20px; 
            border-radius: 8px; 
            border-left: 6px solid #00b900; 
        }
        .student-card { border-bottom: 1px dashed #ccc; padding-bottom: 20px; margin-bottom: 20px; }
        .student-card:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        
        /* 查詢結果的資料字體放大 */
        .student-card p { 
            font-size: 20px; 
            line-height: 1.6; 
            margin: 10px 0; 
            color: #333; 
        }
        .error { color: red; margin-top: 20px; font-weight: bold; text-align: center; font-size: 18px; }
        .loading { color: #666; margin-top: 20px; font-style: italic; font-size: 18px; }
        
        /* Line 超連結按鈕放大，變成大顆按鈕的形式 */
        .line-link { 
            display: block; 
            margin-top: 20px; 
            color: #00b900; 
            font-weight: bold; 
            text-decoration: none; 
            border: 2px solid #00b900; 
            padding: 15px 10px; 
            border-radius: 8px; 
            font-size: 20px; 
            text-align: center;
        }
        .line-link:hover { background-color: #00b900; color: white; }
    </style>
</head>
<body>

<div class="container">
    <!-- 這裡已更新為 .jpg -->
    <img src="福瑞斯特_中小學0618.jpg" alt="學校校徽" class="school-logo">
    
    <h1>115學年度<br>新生班級查詢系統</h1>
    <p class="subtitle">請輸入您的姓名進行查詢</p>
    
    <input type="text" id="studentName" placeholder="例如：王小明" onkeypress="handleEnter(event)">
    <button onclick="searchStudent()">查 詢</button>

    <div id="result"></div>
</div>

<script>
    const gasUrl = "https://script.google.com/macros/s/AKfycbzh-eYHzze74HIcWL9cLUPxH1liLyh4Oyp6rmmawp07SHgIXbzp5vASjxN-SsRZwGuG/exec";

    async function searchStudent() {
        const inputName = document.getElementById("studentName").value.trim();
        const resultDiv = document.getElementById("result");
        
        if(!inputName) {
            resultDiv.innerHTML = "<p class='error'>請輸入姓名！</p>";
            resultDiv.style.display = "block";
            return;
        }

        resultDiv.innerHTML = "<p class='loading'>正在連線查詢中，請稍候...</p>";
        resultDiv.style.display = "block";

        try {
            const response = await fetch(`${gasUrl}?name=${encodeURIComponent(inputName)}`);
            const students = await response.json();

            if (students.length > 0) {
                let htmlContent = "";
                
                students.forEach(student => {
                    htmlContent += `
                        <div class="student-card">
                            <p><strong>姓名：</strong> ${student.name}</p>
                            <p><strong>班級：</strong> ${student.className}</p>
                            <p><strong>座號：</strong> ${student.seat} 號</p>
                            <p><strong>導師：</strong> ${student.teacher} 老師</p>
                            <a href="${student.lineUrl}" target="_blank" class="line-link">加入班級 Line@ 群組</a>
                        </div>
                    `;
                });
                
                resultDiv.innerHTML = htmlContent;
            } else {
                resultDiv.innerHTML = "<p class='error'>找不到此姓名，請確認輸入是否正確。</p>";
            }
        } catch (error) {
            console.error(error);
            resultDiv.innerHTML = "<p class='error'>查詢失敗，請稍後再試。</p>";
        }
    }

    function handleEnter(event) {
        if (event.key === "Enter") {
            searchStudent();
        }
    }
</script>

</body>
</html>
